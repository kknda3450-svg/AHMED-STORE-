<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; }
        .item { background: #fff; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; border-radius: 10px; }
        .item img { width: 60px; height: 60px; border-radius: 5px; }
        .item-info { flex: 1; }
        .btn-del { color: red; border: none; background: none; cursor: pointer; font-size: 20px; }
        .total { font-size: 20px; font-weight: bold; text-align: center; margin-top: 20px; }
        .btn-order { display: block; width: 100%; background: #000; color: #fff; text-align: center; padding: 15px; text-decoration: none; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <h2><i class="fas fa-shopping-cart"></i> سلتي</h2>
    <div id="cartList"></div>
    <div class="total" id="totalPrice">الإجمالي: 0 دج</div>
    
    <a href="order.html" class="btn-order">تأكيد الطلب عبر الإيميل</a>
    <a href="index.html" style="display:block; text-align:center; margin-top:15px; color:#666;">العودة للمتجر</a>

<script>
    function renderCart() {
        let cart = JSON.parse(localStorage.getItem('oumFaresCart')) || [];
        let list = document.getElementById('cartList');
        let total = 0;
        list.innerHTML = "";

        if(cart.length === 0) {
            list.innerHTML = "<p style='text-align:center;'>السلة فارغة</p>";
        }

        cart.forEach((item, index) => {
            total += item.price;
            list.innerHTML += `
                <div class="item">
                    <img src="${item.img}">
                    <div class="item-info">
                        <h4>${item.name}</h4>
                        <p>${item.price} دج</p>
                    </div>
                    <button class="btn-del" onclick="remove(${index})"><i class="fas fa-trash"></i></button>
                </div>
            `;
        });
        document.getElementById('totalPrice').innerText = "الإجمالي: " + total + " دج";
    }

    function remove(index) {
        let cart = JSON.parse(localStorage.getItem('oumFaresCart'));
        cart.splice(index, 1); // حذف العنصر
        localStorage.setItem('oumFaresCart', JSON.stringify(cart));
        renderCart(); // إعادة عرض السلة
    }

    renderCart();
</script>
</body>
</html>
