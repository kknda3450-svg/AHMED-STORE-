<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couture Oum Fares | خياطة أم فارس</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #ffffff; color: #000000; margin: 0; padding: 0; }
        
        /* الهيدر */
        header { background: #ffffff; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; position: sticky; top: 0; z-index: 1000; }
        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-box img { width: 55px; height: 55px; border-radius: 50%; border: 1px solid #000; }
        .logo-text h1 { font-size: 18px; margin: 0; text-transform: uppercase; }

        /* الغلاف */
        .main-banner { width: 100%; height: 200px; background: url('https://i.postimg.cc/mD7D6X0t/Screenshot-20260404-205744.jpg') no-repeat center; background-size: cover; position: relative; border-bottom: 1px solid #eee; }
        .banner-text { position: absolute; bottom: 10px; right: 20px; background: rgba(0,0,0,0.7); color: #fff; padding: 5px 15px; border-radius: 5px; font-size: 14px; }

        /* المنتجات */
        .shop-container { padding: 30px 5%; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; }
        .product-item { border: 1px solid #eee; padding: 10px; transition: 0.3s; }
        .product-item:hover { border-color: #000; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .product-item img { width: 100%; height: 320px; object-fit: cover; }
        .product-info { padding: 15px 0; text-align: center; }
        .buy-now { background: #000; color: #fff; text-decoration: none; padding: 12px; display: block; font-weight: bold; margin-top: 10px; }

        /* تواصل */
        footer { background: #f9f9f9; padding: 30px; text-align: center; border-top: 1px solid #eee; }
        .fb-link { color: #000; text-decoration: none; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <img src="https://i.postimg.cc/q733M0fK/1775332654457.jpg" alt="Logo">
        <div class="logo-text">
            <h1>Couture Oum Fares</h1>
            <span style="font-size: 12px;">أناقة تبدأ من الإبرة والخيط</span>
        </div>
    </div>
    <a href="https://www.facebook.com/awlady.jnty.383860" target="_blank" class="fb-link">
        <i class="fab fa-facebook"></i>
    </a>
</header>

<div class="main-banner">
    <div class="banner-text">الجلفة - بلدية الزعفران 📍</div>
</div>

<div class="shop-container">
    <div class="product-grid">
        <div class="product-item">
            <img src="رابط_صورة_الفستان" alt="تصميم أم فارس">
            <div class="product-info">
                <h3>فستان موديل كلاسيك</h3>
                <p>قماش ممتاز وتفصيل دقيق</p>
                <a href="order.html" class="buy-now">اطلبي الآن ✂️</a>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>تابعونا على الفيسبوك لمشاهدة جديدنا</p>
    <a href="https://www.facebook.com/awlady.jnty.383860" class="fb-link">Couture Oum Fares</a>
    <p style="font-size: 10px; color: #999; margin-top: 20px;">Designed by Harfoush VIP</p>
</footer>

</body>
</html>
