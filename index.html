<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب خياطة وتفصيل</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; text-align: center; padding: 20px; }
        .form-container { background: white; max-width: 450px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 5px solid #d63384; }
        h2 { color: #d63384; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .submit-btn { background: #d63384; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .submit-btn:hover { background: #b02a6b; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>✂️ إرسال طلب تفصيل</h2>
        <p>املئي البيانات وسنتصل بكِ لتأكيد الموعد</p>

        <form action="https://formspree.io/f/mdappaoy" method="POST">
            <label>الاسم الكامل:</label>
            <input type="text" name="name" placeholder="أدخلي اسمكِ هنا" required>

            <label>رقم الهاتف:</label>
            <input type="tel" name="phone" placeholder="06XXXXXXXX" required>

            <label>نوع الخدمة:</label>
            <select name="service">
                <option value="فساتين سهرة">فستان سهرة</option>
                <option value="قندورة دار">قندورة دار</option>
                <option value="تعديل مقاسات">تعديل وملابس</option>
            </select>

            <label>ملاحظات إضافية:</label>
            <textarea name="message" rows="4" placeholder="مثلاً: نوع القماش، الوقت المطلوب..."></textarea>

            <button type="submit" class="submit-btn">إرسال الطلب الآن ✨</button>
        </form>
    </div>

</body>
</html>
