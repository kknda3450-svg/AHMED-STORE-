<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couture Oum Fares | الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff; color: #000; margin: 0; padding: 0; }
        header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; position: sticky; top: 0; background: #fff; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo img { width: 60px; height: 60px; border-radius: 50%; border: 1px solid #000; object-fit: cover; }
        
        .container { padding: 20px 5%; }
        .section-title { background: #000; color: #fff; padding: 10px; margin: 30px 0 15px; font-size: 18px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .item-card { border: 1px solid #eee; transition: 0.3s; padding: 10px; text-align: center; }
        .item-card:hover { border-color: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .item-card img { width: 100%; height: 300px; object-fit: cover; }
        
        .btn-view { display: block; background: #000; color: #fff; text-decoration: none; padding: 12px; margin-top: 10px; font-weight: bold; }
        footer { text-align: center; padding: 30px; background: #f9f9f9; font-size: 12px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="https://i.postimg.cc/rydfKvRB/Gemini-Generated-Image-ahf8dqahf8dqahf8.png" alt="Oum Fares Logo">
        <div>
            <h1 style="font-size: 18px; margin: 0;">COUTURE OUM FARES</h1>
            <small>أناقة الإبرة والخيط</small>
        </div>
    </div>
    <a href="https://www.facebook.com/awlady.jnty.383860" style="color:#000; font-size: 24px;"><i class="fab fa-facebook"></i></a>
</header>

<div class="container">
    <div class="section-title">👗 ركن الفساتين والقنادر</div>
    <div class="grid">
        <div class="item-card">
            <img src="رابط_صورة_الفستان" alt="فستان">
            <h3>فستان سهرة عصري</h3>
            <a href="details.html" class="btn-view">استكشاف الموديل ✨</a>
        </div>
    </div>

    <div class="section-title">🛏️ الأفرشة وأغطية النوم</div>
    <div class="grid">
        <div class="item-card">
            <img src="رابط_صورة_الفراش" alt="أفرشة">
            <h3>طقم سرير مطرز</h3>
            <a href="details.html" class="btn-view">التفاصيل ✨</a>
        </div>
    </div>

    <div class="section-title">🛋️ شورات الصالة</div>
    <div class="grid">
        <div class="item-card">
            <img src="رابط_صورة_الشورة" alt="شورة">
            <h3>تجهيز صالون ملكي</h3>
            <a href="details.html" class="btn-view">التفاصيل ✨</a>
        </div>
    </div>
</div>

<footer>
    <p>جميع الحقوق محفوظة لورشة أم فارس &copy; 2026</p>
    <p>Designed by Harfoush VIP</p>
</footer>

</body>
</html>
