<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الأناقة - Harfoush Sewing</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #d63384; margin-bottom: 30px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .product-card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .product-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; background: #eee; }
        .product-name { font-size: 20px; font-weight: bold; margin: 10px 0; color: #333; }
        .product-price { color: #d63384; font-size: 18px; font-weight: bold; margin-bottom: 15px; display: block; }
        .buy-btn { background: #d63384; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; display: block; font-weight: bold; transition: 0.3s; }
        .buy-btn:hover { background: #b02a6b; }
    </style>
</head>
<body>

    <h1>✨ معرض تصاميم Harfoush VIP ✨</h1>

    <div class="products-grid">
        
        <div class="product-card">
            <img src="https://via.placeholder.com/250x350?text=فستان+1" alt="فستان">
            <div class="product-name">فستان سهرة ملكي</div>
            <span class="product-price">8500 دج</span>
            <a href="order.html" class="buy-btn">تأكيد الطلب ✂️</a>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/250x350?text=قندورة+2" alt="قندورة">
            <div class="product-name">قندورة قطيفة عصرية</div>
            <span class="product-price">4500 دج</span>
            <a href="order.html" class="buy-btn">تأكيد الطلب ✂️</a>
        </div>

        </div>

</body>
</html>
