<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | Couture Oum Fares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #fff; color: #000; }
        header { padding: 15px; border-bottom: 2px solid #000; display: flex; align-items: center; gap: 15px; }
        header img { width: 40px; border-radius: 50%; }
        
        .product-container { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .image-gallery img { width: 100%; border: 1px solid #eee; }
        
        .details-info h1 { font-size: 24px; margin: 10px 0; }
        .price { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 15px; }
        .description { line-height: 1.6; color: #555; border-top: 1px solid #eee; padding-top: 15px; }
        
        .features { margin: 20px 0; padding: 0; list-style: none; }
        .features li { margin-bottom: 8px; font-size: 14px; }
        .features li i { color: #000; margin-left: 10px; }

        .action-buttons { position: sticky; bottom: 0; background: white; padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .btn-order { flex: 2; background: #000; color: #fff; text-decoration: none; text-align: center; padding: 15px; font-weight: bold; }
        .btn-back { flex: 1; background: #eee; color: #000; text-decoration: none; text-align: center; padding: 15px; }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/q733M0fK/1775332654457.jpg" alt="Logo">
    <div style="font-weight: bold;">Couture Oum Fares</div>
</header>

<div class="product-container">
    <div class="image-gallery">
        <img src="https://i.postimg.cc/mD7D6X0t/Screenshot-20260404-205744.jpg" alt="Product Image">
    </div>

    <div class="details-info">
        <h1>فستان سهرة ملكي - تفصيل خاص</h1>
        <div class="price">السعر: يبدأ من 8500 دج</div>
        
        <div class="description">
            هذا الموديل يتم خياطته حسب الطلب وبقياسات الزبونة الشخصية. نستخدم أجود أنواع الأقمشة لضمان الراحة والأناقة.
        </div>

        <ul class="features">
            <li><i class="fas fa-check"></i> إمكانية اختيار اللون</li>
            <li><i class="fas fa-check"></i> تعديل القصة حسب الرغبة</li>
            <li><i class="fas fa-check"></i> مدة الإنجاز: 7-10 أيام</li>
        </ul>
    </div>
</div>

<div class="action-buttons">
    <a href="index.html" class="btn-back">رجوع</a>
    <a href="order.html" class="btn-order">تأكيد الطلب الآن 🛍️</a>
</div>

</body>
</html>
