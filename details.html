<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | Couture Oum Fares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; }
        header { padding: 15px; border-bottom: 2px solid #000; text-align: center; }
        header img { width: 60px; border-radius: 50%; border: 1px solid #000; }
        .product-content { padding: 20px; max-width: 800px; margin: auto; }
        .product-img { width: 100%; border: 1px solid #eee; }
        .info { padding: 20px 0; }
        .price { font-size: 22px; font-weight: bold; color: #000; margin: 10px 0; }
        .desc { color: #555; line-height: 1.8; }
        .action-bar { position: sticky; bottom: 0; background: #fff; padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .btn-main { flex: 2; background: #000; color: #fff; text-decoration: none; text-align: center; padding: 15px; font-weight: bold; }
        .btn-sec { flex: 1; background: #f4f4f4; color: #000; text-decoration: none; text-align: center; padding: 15px; }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/q733M0fK/1775332654457.jpg" alt="Logo">
</header>

<div class="product-content">
    <img src="https://via.placeholder.com/600x700" class="product-img">
    <div class="info">
        <h1>اسم الموديل المختار</h1>
        <div class="price">السعر حسب نوع القماش</div>
        <p class="desc">نضمن لكم جودة الخياطة والاتقان في التفاصيل. يمكنكم اختيار اللون والمقاس المناسب عند التواصل معنا.</p>
    </div>
</div>

<div class="action-bar">
    <a href="index.html" class="btn-sec">رجوع</a>
    <a href="order.html" class="btn-main">اطلبي الآن 🛍️</a>
</div>

</body>
</html>
