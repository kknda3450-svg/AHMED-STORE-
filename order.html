<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الطلب</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        h2 { color: #d63384; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { background: #d63384; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>📝 معلومات الزبون</h2>
        <form action="https://formspree.io/f/mdappaoy" method="POST">
            <input type="text" name="customer_name" placeholder="الاسم الكامل" required>
            <input type="tel" name="phone" placeholder="رقم الهاتف" required>
            <input type="text" name="address" placeholder="العنوان (الولاية/البلدية)" required>
            <textarea name="details" rows="3" placeholder="ملاحظات (المقاس، اللون...)"></textarea>
            <button type="submit" class="submit-btn">إرسال الطلب النهائي ✅</button>
        </form>
    </div>

</body>
</html>
