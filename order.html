<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الطلب | Couture Oum Fares</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; color: #000; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #fff; padding: 20px; text-align: center; border-bottom: 2px solid #000; }
        header img { width: 60px; border-radius: 50%; }
        .form-container { flex: 1; display: flex; justify-content: center; padding: 40px 20px; }
        .order-form { background: #fff; width: 100%; max-width: 450px; padding: 30px; border: 1px solid #ddd; }
        h2 { border-bottom: 1px solid #000; padding-bottom: 10px; margin-bottom: 25px; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; box-sizing: border-box; }
        .submit-btn { width: 100%; background: #000; color: #fff; border: none; padding: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/q733M0fK/1775332654457.jpg" alt="Logo">
</header>

<div class="form-container">
    <div class="order-form">
        <h2>معلومات الطلب</h2>
        <form action="https://formspree.io/f/mdappaoy" method="POST">
            <input type="text" name="الاسم" placeholder="الاسم الكامل" required>
            <input type="tel" name="الهاتف" placeholder="رقم الهاتف" required>
            <select name="المنتج">
                <option value="فستان">فستان / قندورة</option>
                <option value="أفرشة">طقم أفرشة</option>
                <option value="شورة">شورة صالة</option>
            </select>
            <input type="text" name="العنوان" placeholder="الولاية والبلدية" required>
            <textarea name="ملاحظات" rows="4" placeholder="المقاس أو أي طلب خاص..."></textarea>
            <button type="submit" class="submit-btn">إرسال الطلب النهائي ✅</button>
        </form>
    </div>
</div>

</body>
</html>
