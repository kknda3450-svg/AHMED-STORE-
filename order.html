<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الطلبية</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff; margin: 0; padding: 20px; }
        .order-box { max-width: 450px; margin: auto; border: 2px solid #000; padding: 25px; }
        .logo-small { text-align: center; margin-bottom: 20px; }
        .logo-small img { width: 70px; border-radius: 50%; border: 1px solid #000; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-send { background: #000; color: #fff; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; }
        h2 { text-align: center; font-size: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="order-box">
    <div class="logo-small">
        <img src="https://i.postimg.cc/rydfKvRB/Gemini-Generated-Image-ahf8dqahf8dqahf8.png" alt="Logo">
    </div>
    <h2>تأكيد الطلبية 📋</h2>
    <form action="https://formspree.io/f/mdappaoy" method="POST">
        <input type="text" name="name" placeholder="الاسم الكامل" required>
        <input type="tel" name="phone" placeholder="رقم الهاتف" required>
        <select name="service">
            <option>خياطة فستان</option>
            <option>طقم أفرشة</option>
            <option>شورة صالة</option>
        </select>
        <input type="text" name="address" placeholder="العنوان (الولاية/البلدية)" required>
        <textarea name="note" rows="3" placeholder="ملاحظات إضافية..."></textarea>
        <button type="submit" class="btn-send">إرسال الطلب النهائي ✅</button>
    </form>
</div>

</body>
</html>
