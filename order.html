<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الطلبية | Couture Oum Fares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #000; --orange: #e67e22; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #333; margin: 0; padding: 15px; }
        
        .order-container { 
            max-width: 500px; 
            margin: 10px auto; 
            background: #fff; 
            border-radius: 30px; 
            padding: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .header-order { text-align: center; margin-bottom: 20px; }
        .header-order img { width: 70px; height: 70px; border-radius: 50%; border: 1.5px solid var(--accent); padding: 3px; }
        .header-order h3 { margin: 10px 0 0; font-size: 16px; font-weight: 900; color: var(--accent); }
        
        h2 { text-align: center; font-size: 20px; margin-bottom: 25px; color: var(--accent); }
        
        /* ملخص السلة داخل صفحة التأكيد */
        .order-summary {
            background: #fffcf9;
            border: 1px dashed var(--orange);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .summary-title { font-size: 13px; font-weight: bold; color: var(--orange); margin-bottom: 8px; display: block; }
        #items-list { font-size: 14px; font-weight: 600; line-height: 1.6; }

        label { display: block; margin-top: 15px; font-weight: 700; font-size: 13px; color: #555; padding-right: 5px; }
        
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            margin-top: 6px; 
            border: 1.5px solid #eee; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 15px; 
            background: #fcfcfc;
            transition: 0.3s;
            font-family: inherit;
        }
        input:focus, textarea:focus { border-color: var(--orange); background: #fff; outline: none; }
        
        .btn-send { 
            width: 100%; 
            background: var(--accent); 
            color: #fff; 
            border: none; 
            padding: 16px; 
            font-weight: 800; 
            margin-top: 30px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-size: 16px; 
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-send:hover { background: #333; transform: translateY(-2px); }
        
        .back-link { 
            display: block; 
            text-align: center; 
            margin-top: 20px; 
            color: #999; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600;
        }

        footer { text-align: center; margin-top: 30px; color: #bbb; font-size: 10px; }
    </style>
</head>
<body>

<div class="order-container">
    <div class="header-order">
        <img src="https://i.postimg.cc/rydfKvRB/Gemini-Generated-Image-ahf8dqahf8dqahf8.png" alt="Logo">
        <h3>COUTURE OUM FARES</h3>
    </div>

    <h2>تأكيد الطلبية 📋</h2>

    <div class="order-summary">
        <span class="summary-title"><i class="fas fa-shopping-cart"></i> المنتجات المختارة:</span>
        <div id="items-list">جاري تحميل السلة...</div>
        <div id="total-price" style="margin-top:10px; font-weight: 800; border-top: 1px solid #ffe5d0; pt:5px;"></div>
    </div>
    
    <form action="https://formspree.io/f/mdappaoy" method="POST" id="orderForm">
        <input type="hidden" name="الطلبية_التفصيلية" id="hiddenCartData">
        <input type="hidden" name="إجمالي_المبلغ" id="hiddenTotal">

        <label><i class="fas fa-user"></i> الاسم الكامل:</label>
        <input type="text" name="الاسم" placeholder="أدخلي اسمكِ هنا" required>

        <label><i class="fas fa-phone"></i> رقم الهاتف:</label>
        <input type="tel" name="الهاتف" placeholder="06xxxxxxxx" required>

        <label><i class="fas fa-map-marker-alt"></i> العنوان (الولاية والبلدية):</label>
        <input type="text" name="العنوان" placeholder="مثلاً: الجزائر - باب الزوار" required>

        <label><i class="fas fa-pen"></i> ملاحظات إضافية:</label>
        <textarea name="الملاحظات" rows="3" placeholder="لون معين، مقاس خاص، أو وقت التوصيل..."></textarea>

        <button type="submit" class="btn-send">إرسال الطلب الآن <i class="fas fa-paper-plane"></i></button>
    </form>
    
    <a href="cart.html" class="back-link">← العودة للسلة وتعديل الطلب</a>
</div>

<footer>
    جميع الحقوق محفوظة لورشة أم فارس &copy; 2026
</footer>

<script>
    // جلب البيانات من السلة (LocalStorage)
    let cart = JSON.parse(localStorage.getItem('oumFaresCart')) || [];
    const itemsList = document.getElementById('items-list');
    const hiddenCartData = document.getElementById('hiddenCartData');
    const totalDisplay = document.getElementById('total-price');
    const hiddenTotal = document.getElementById('hiddenTotal');

    if (cart.length === 0) {
        itemsList.innerHTML = "<span style='color:red;'>السلة فارغة! يرجى اختيار موديل أولاً.</span>";
        document.querySelector('.btn-send').disabled = true;
        document.querySelector('.btn-send').style.opacity = "0.5";
    } else {
        let cartText = "";
        let total = 0;
        
        cart.forEach((item, index) => {
            cartText += `${index + 1}. ${item.name} (${item.price} دج)\n`;
            total += item.price;
        });

        // عرض المنتجات للزبونة
        itemsList.innerText = cartText;
        totalDisplay.innerText = "الإجمالي: " + total + " دج";

        // تجهيز البيانات المخفية للفورم (Formspree)
        hiddenCartData.value = cartText;
        hiddenTotal.value = total + " دج";
    }

    // مسح السلة بعد إرسال الفورم بنجاح (اختياري)
    document.getElementById('orderForm').onsubmit = function() {
        // إذا أردت مسح السلة بعد الطلب مباشرة:
        // localStorage.removeItem('oumFaresCart');
    };
</script>

</body>
</html>
