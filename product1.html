<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استكشاف الموديل | Couture Oum Fares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #000; --orange: #e67e22; --gray: #f8f8f8; --success: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #fff; color: #000; padding-bottom: 120px; }
        
        header { padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 1000; }
        header img { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #000; object-fit: cover; }
        .cart-icon { position: relative; font-size: 22px; color: #000; text-decoration: none; }
        .cart-count { position: absolute; top: -8px; right: -10px; background: var(--orange); color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 50%; }
        
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .price-badge { background: var(--orange); color: #fff; padding: 8px 15px; border-radius: 50px; font-weight: bold; margin-bottom: 15px; display: inline-block; }
        .main-img-wrapper { width: 100%; height: 380px; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .main-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .info h1 { font-size: 24px; margin: 20px 0 10px; }
        .description { background: #fafafa; padding: 15px; border-radius: 15px; line-height: 1.7; color: #555; }

        /* التنبيه الاحترافي (Toast) */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast i { color: var(--success); font-size: 18px; }

        .order-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; display: flex; gap: 10px; background: #fff; padding: 12px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; border: 1px solid #eee; }
        .btn-add { flex: 2; background: #000; color: #fff; border: none; padding: 15px; font-weight: bold; border-radius: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-back { flex: 1; background: #f1f1f1; color: #333; text-decoration: none; text-align: center; padding: 15px; border-radius: 40px; font-weight: bold; }
    </style>
</head>
<body>

<div id="toast" class="toast">
    <i class="fas fa-check-circle"></i> تمت إضافة الموديل للسلة!
</div>

<header>
    <div style="display: flex; align-items: center; gap: 10px;">
        <img src="https://i.postimg.cc/rydfKvRB/Gemini-Generated-Image-ahf8dqahf8dqahf8.png">
        <div style="font-weight: 800; font-size: 14px;">OUM FARES</div>
    </div>
    <a href="cart.html" class="cart-icon">
        <i class="fas fa-shopping-bag"></i>
        <span class="cart-count" id="cart-count">0</span>
    </a>
</header>

<div class="container">
    <div class="price-badge" id="displayPrice">1200 دج</div>
    <div class="main-img-wrapper">
        <img src="https://i.postimg.cc/MTNZzvvN/Messenger-creation-865167DC-2C63-4C28-80BB-2116F04A295C-2.jpg" id="prodImg">
    </div>

    <div class="info">
        <h1 id="prodName">طراشين ومناديل المطبخ</h1>
        <div class="description">
            <strong>الوصف:</strong><br>
            طقم فاخر من ورشة أم فارس، يتميز بجودة الخياطة والألوان الزاهية.
        </div>
    </div>
</div>

<div class="order-nav">
    <a href="index.html" class="btn-back">رجوع</a>
    <button class="btn-add" onclick="addToCart()">إضافة للسلة <i class="fas fa-cart-plus"></i></button>
</div>

<script>
    let cart = JSON.parse(localStorage.getItem('oumFaresCart')) || [];

    function updateCartCount() {
        document.getElementById('cart-count').innerText = cart.length;
    }

    function addToCart() {
        const product = {
            name: document.getElementById('prodName').innerText,
            price: 1200, // عدل السعر حسب الموديل
            img: document.getElementById('prodImg').src
        };
        
        cart.push(product);
        localStorage.setItem('oumFaresCart', JSON.stringify(cart));
        updateCartCount();

        // التنبيه الاحترافي بدل Alert
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    updateCartCount();
</script>
</body>
</html>
