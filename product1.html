<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استكشاف الموديلات | Couture Oum Fares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #000; --orange: #e67e22; --gray: #f8f8f8; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #fff; color: #000; padding-bottom: 120px; }
        
        /* الهيدر مع السلة */
        header { 
            padding: 10px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #eee; 
            position: sticky; 
            top: 0; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            z-index: 1000; 
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        header img { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--accent); object-fit: cover; }
        .cart-icon { position: relative; font-size: 22px; color: var(--accent); cursor: pointer; text-decoration: none; }
        .cart-count { 
            position: absolute; top: -8px; right: -10px; background: var(--orange); 
            color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 50%; font-weight: bold; 
        }
        
        .container { max-width: 550px; margin: auto; padding: 20px; }
        
        /* السعر فوق الصورة */
        .gallery-container { position: relative; }
        .price-badge { 
            position: absolute; top: 15px; right: 15px; background: var(--orange); color: #fff; 
            padding: 8px 15px; border-radius: 50px; font-weight: bold; font-size: 16px; z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .main-img-wrapper { width: 100%; height: 420px; overflow: hidden; border-radius: 20px; border: 1px solid #f0f0f0; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .main-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        .thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .thumb-img { width: 100%; height: 90px; object-fit: cover; border-radius: 12px; border: 2.5px solid transparent; cursor: pointer; transition: 0.3s; opacity: 0.6; }
        .thumb-img.active { opacity: 1; border-color: var(--accent); transform: scale(0.95); }

        /* تفاصيل المنتج */
        .info { text-align: center; padding: 0 10px; }
        .info h1 { font-size: 26px; margin: 10px 0; font-weight: 800; color: #1a1a1a; }
        .info p { color: #555; line-height: 1.8; font-size: 16px; margin-bottom: 25px; }

        .features { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; font-size: 13px; color: #777; font-weight: 600; }
        .features span { background: var(--gray); padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }

        /* شريط الطلب العائم */
        .order-nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; 
            max-width: 450px; display: flex; gap: 12px; background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px); padding: 10px; border-radius: 100px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); z-index: 1000; border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .btn-order { 
            flex: 3; background: var(--accent); color: #fff; text-decoration: none; text-align: center; 
            padding: 16px; font-weight: 800; font-size: 16px; border-radius: 100px;
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-order:hover { background: #333; transform: scale(1.03); }

        .btn-back { 
            flex: 1; background: #fff; color: #000; text-decoration: none; text-align: center; 
            padding: 16px; font-weight: bold; border-radius: 100px; border: 1px solid #eee;
        }

        @media (max-width: 500px) {
            .main-img-wrapper { height: 320px; }
            .order-nav { width: 92%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="https://i.postimg.cc/rydfKvRB/Gemini-Generated-Image-ahf8dqahf8dqahf8.png" alt="Logo">
        <div style="font-weight: 800; font-size: 13px;">COUTURE OUM FARES</div>
    </div>
    <a href="order.html" class="cart-icon">
        <i class="fas fa-shopping-bag"></i>
        <span class="cart-count">1</span>
    </a>
</header>

<div class="container">
    <div class="gallery-container">
        <div class="price-badge">1200 دج</div>
        
        <div class="main-img-wrapper">
            <img src="https://i.postimg.cc/MTNZzvvN/Messenger-creation-865167DC-2C63-4C28-80BB-2116F04A295C-2.jpg" id="mainDisplay" alt="Product Main">
        </div>

        <div class="thumb-grid">
            <img src="https://i.postimg.cc/MTNZzvvN/Messenger-creation-865167DC-2C63-4C28-80BB-2116F04A295C-2.jpg" class="thumb-img active" onclick="changeImage(this)" alt="Detail 1">
            <img src="رابط_الصورة_الثانية" class="thumb-img" onclick="changeImage(this)" alt="Detail 2">
            <img src="رابط_الصورة_الثالثة" class="thumb-img" onclick="changeImage(this)" alt="Detail 3">
        </div>
    </div>

    <div class="info">
        <h1>طراشين ومناديل</h1>
        
        <div class="features">
            <span><i class="fas fa-check-circle"></i> إتقان تام</span>
            <span><i class="fas fa-gem"></i> قماش ملكي</span>
            <span><i class="fas fa-truck"></i> توصيل متاح</span>
        </div>

        <p>
            طقم فاخر من ورشة أم فارس، يتميز بخياطة دقيقة وتصاميم تجمع بين الأصالة والحداثة لتزيين مائدتكِ بأجمل الإبداعات.
        </p>
    </div>
</div>

<div class="order-nav">
    <a href="index.html" class="btn-back"><i class="fas fa-arrow-right"></i></a>
    <a href="order.html" class="btn-order">
        إضافة للطلب <i class="fas fa-cart-plus"></i>
    </a>
</div>

<script>
    function changeImage(element) {
        document.getElementById('mainDisplay').src = element.src;
        let thumbs = document.getElementsByClassName('thumb-img');
        for (let i = 0; i < thumbs.length; i++) {
            thumbs[i].classList.remove('active');
        }
        element.classList.add('active');
    }
</script>

</body>
</html>
