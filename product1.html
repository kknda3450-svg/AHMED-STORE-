<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استكشاف الموديلات | Couture Oum Fares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; color: #000; padding-bottom: 80px; }
        header { padding: 15px; border-bottom: 2px solid #000; text-align: center; background: #fff; position: sticky; top: 0; z-index: 100; }
        header img { width: 70px; height: 70px; border-radius: 50%; border: 1px solid #000; object-fit: cover; }
        
        .container { max-width: 600px; margin: auto; padding: 20px; }
        
        /* معرض الصور */
        .main-img { width: 100%; height: 400px; object-fit: cover; border: 1px solid #eee; margin-bottom: 10px; }
        .thumb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .thumb-img { width: 100%; height: 150px; object-fit: cover; border: 1px solid #eee; cursor: pointer; transition: 0.3s; }
        .thumb-img:hover { border-color: #000; }

        .info { border-top: 1px solid #eee; padding-top: 20px; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #666; line-height: 1.8; margin-bottom: 30px; }

        /* شريط الطلب السفلي */
        .order-nav { position: fixed; bottom: 0; width: 100%; display: flex; border-top: 2px solid #000; background: #fff; z-index: 1000; }
        .btn-order { flex: 2; background: #000; color: #fff; text-decoration: none; text-align: center; padding: 20px; font-weight: bold; font-size: 18px; }
        .btn-back { flex: 1; background: #f4f4f4; color: #000; text-decoration: none; text-align: center; padding: 20px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/rydfKvRB/Gemini-Generated-Image-ahf8dqahf8dqahf8.png" alt="Logo">
    <div style="font-weight: bold; margin-top: 5px;">COUTURE OUM FARES</div>
</header>

<div class="container">
    <img src="https://i.postimg.cc/MTNZzvvN/Messenger-creation-865167DC-2C63-4C28-80BB-2116F04A295C-2.jpg" class="main-img" alt="Product Main">

    <div class="thumb-grid">
        <img src="رابط_الصورة_الثانية" class="thumb-img" alt="Detail 1">
        <img src="رابط_الصورة_الثالثة" class="thumb-img" alt="Detail 2">
    </div>

    <div class="info">
        <h1>طراشين</h1>
        <p>
            هذا الطقم مصنوع من أجود أنواع الأقمشة، بخياطة يدوية دقيقة من ورشة أم فارس. 
            نهتم بالتفاصيل الصغيرة لنقدم لكِ قطعة فنية تليق ببيتكِ.
        </p>
    </div>
</div>

<div class="order-nav">
    <a href="index.html" class="btn-back">رجوع</a>
    <a href="order.html" class="btn-order">اطلبي الآن 🛍️</a>
</div>

</body>
</html>
